<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشاطي الرياضي</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-neon: #22c55e;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 20px;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .profile-pic { width: 45px; height: 45px; border-radius: 50%; background: var(--accent-blue); }
        
        .main-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: ''; position: absolute; top: -50%; right: -50%;
            width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.03);
        }
        .stat-value { font-size: 28px; font-weight: 700; margin: 10px 0 5px; }
        .stat-label { font-size: 14px; color: #94a3b8; }
        
        .progress-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 30px;
            margin-bottom: 25px;
        }
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .chart-container {
            height: 150px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding-top: 20px;
        }
        .bar {
            width: 12%;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 10px;
            transition: height 1s ease;
            position: relative;
        }
        .bar.active { background: var(--accent-blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        
        .daily-goal {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, #22c55e22, transparent);
            padding: 15px;
            border-radius: 20px;
            border-right: 4px solid var(--accent-neon);
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div style="font-size: 14px; color: #94a3b8;">مرحباً محمد 👋</div>
            <div style="font-size: 20px; font-weight: 700;">لوحة النشاط</div>
        </div>
        <div class="profile-pic"></div>
    </div>

    <div class="main-stats">
        <div class="stat-card">
            <div class="stat-label">الخطوات</div>
            <div class="stat-value">8,432</div>
            <div style="font-size: 12px; color: var(--accent-neon);">+12% اليوم</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">السعرات</div>
            <div class="stat-value">450</div>
            <div style="font-size: 12px; color: #94a3b8;">كيلو كالوري</div>
        </div>
    </div>

    <div class="progress-section">
        <div class="progress-header">
            <div style="font-weight: 700;">نشاط الأسبوع</div>
            <div style="font-size: 12px; color: var(--accent-blue);">عرض الكل</div>
        </div>
        <div class="chart-container">
            <div class="bar" style="height: 40%;"></div>
            <div class="bar" style="height: 60%;"></div>
            <div class="bar" style="height: 35%;"></div>
            <div class="bar active" style="height: 85%;"></div>
            <div class="bar" style="height: 50%;"></div>
            <div class="bar" style="height: 70%;"></div>
            <div class="bar" style="height: 45%;"></div>
        </div>
    </div>

    <div class="daily-goal">
        <div style="margin-right: 15px;">🎯</div>
        <div>
            <div style="font-size: 14px; font-weight: 700;">أنت قريب من هدفك!</div>
            <div style="font-size: 12px; color: #94a3b8;">تبقى 1,568 خطوة لإكمال الهدف اليومي.</div>
        </div>
    </div>
</body>
</html>
