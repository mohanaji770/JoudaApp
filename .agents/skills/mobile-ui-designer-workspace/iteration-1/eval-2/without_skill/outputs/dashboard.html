<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
        .stat { font-size: 24px; font-weight: bold; color: #bb86fc; }
    </style>
</head>
<body>
    <h1>Dashboard</h1>
    <div class="card">
        <div>Steps</div>
        <div class="stat">8,432</div>
    </div>
    <div class="card">
        <div>Calories</div>
        <div class="stat">450 kcal</div>
    </div>
</body>
</html>
