<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول - قهوة النخبة</title>
    <style>
        :root {
            --ios-bg: #ffffff;
            --ios-gray: #f2f2f7;
            --ios-blue: #007aff;
            --text-main: #000000;
            --text-secondary: #8e8e93;
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            padding: 60px 20px 20px;
            text-align: right;
        }
        h1 { font-size: 34px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .subtitle { font-size: 17px; color: var(--text-secondary); margin-top: 5px; }
        
        .form-container {
            width: 100%;
            padding: 20px;
            margin-top: 20px;
        }
        .input-group {
            background-color: var(--ios-gray);
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 12px 16px;
            transition: background-color 0.2s ease;
        }
        .input-group:focus-within {
            background-color: #e5e5ea;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 17px;
            color: var(--text-main);
            padding: 0;
            outline: none;
        }
        
        .primary-btn {
            width: 100%;
            background-color: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            margin-top: 25px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .primary-btn:active { opacity: 0.7; }
        
        .footer-links {
            margin-top: 30px;
            text-align: center;
        }
        .footer-links a {
            color: var(--ios-blue);
            text-decoration: none;
            font-size: 15px;
            margin: 0 10px;
        }
        
        /* Apple-style Blur Effect */
        .blur-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>قهوة النخبة</h1>
        <div class="subtitle">سجل دخولك لتجربة فريدة</div>
    </div>

    <div class="form-container">
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" placeholder="example@me.com" autofocus>
        </div>
        
        <div class="input-group">
            <label>كلمة السر</label>
            <input type="password" placeholder="مطلوبة">
        </div>
        
        <button class="primary-btn">تسجيل الدخول</button>
        
        <div class="footer-links">
            <a href="#">نسيت كلمة السر؟</a>
            <span style="color: #c7c7cc;">|</span>
            <a href="#">إنشاء حساب</a>
        </div>
    </div>
</body>
</html>
